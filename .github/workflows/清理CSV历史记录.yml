name: 清理CSV历史记录

on:
  workflow_dispatch:
    inputs:
      size_threshold:
        description: '文件大小阈值（单位：MB），只清理大于此值的CSV'
        required: false
        default: '1'
        type: string
      force_push:
        description: '强制推送到远程仓库'
        required: false
        default: false
        type: boolean

jobs:
  clean-csv-history:
    name: 清理已删除的CSV历史记录
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库（完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 配置Git用户信息
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 分析并清理已删除的CSV历史记录
        id: clean
        run: |
          echo "=========================================="
          echo "🗑️  分析并清理已删除的CSV历史记录"
          echo "=========================================="
          echo ""
          
          THRESHOLD="${{ github.event.inputs.size_threshold || '1' }}"
          THRESHOLD_BYTES=$((THRESHOLD * 1024 * 1024))
          
          echo "🔍 文件大小阈值: ${THRESHOLD}MB"
          echo ""
          
          # 获取当前代码中的所有文件
          echo "📋 获取当前代码文件列表..."
          git ls-tree -r HEAD --name-only | sort > /tmp/current-files.txt
          CURRENT_COUNT=$(wc -l < /tmp/current-files.txt)
          echo "  当前代码文件总数: ${CURRENT_COUNT}"
          echo ""
          
          # 查找历史中所有已删除的CSV文件
          echo "🔍 扫描历史中的CSV文件..."
          git rev-list --objects --all | \
            git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' | \
            awk -v threshold="$THRESHOLD_BYTES" '
              /^blob/ && $3 ~ /\.csv$/ && $2 > threshold {
                size_mb = $2 / 1024 / 1024
                printf "%.2f MB\t%s\n", size_mb, $3
              }
            ' | sort -hr > /tmp/all-csv-files.txt
          
          if [ ! -s /tmp/all-csv-files.txt ]; then
            echo "✅ 没有找到大于 ${THRESHOLD}MB 的CSV历史文件"
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TOTAL_CSV=$(wc -l < /tmp/all-csv-files.txt)
          TOTAL_SIZE=$(awk '{sum += $1} END {printf "%.2f", sum}' /tmp/all-csv-files.txt)
          echo "  找到 ${TOTAL_CSV} 个CSV历史对象，总大小 ${TOTAL_SIZE} MB"
          echo ""
          
          # 找出已从当前代码中删除的CSV文件
          echo "🎯 筛选已从当前代码中删除的CSV文件..."
          > /tmp/csv-to-delete.txt
          > /tmp/csv-still-exists.txt
          
          while IFS=$'\t' read -r size filepath; do
            if grep -qxF "$filepath" /tmp/current-files.txt; then
              echo "$filepath" >> /tmp/csv-still-exists.txt
            else
              echo "$filepath" >> /tmp/csv-to-delete.txt
            fi
          done < <(awk '{print $1 "\t" $2}' /tmp/all-csv-files.txt | sort -u -k2)
          
          DELETE_COUNT=$(wc -l < /tmp/csv-to-delete.txt 2>/dev/null || echo 0)
          STILL_EXISTS_COUNT=$(wc -l < /tmp/csv-still-exists.txt 2>/dev/null || echo 0)
          
          echo ""
          echo "📊 分析结果："
          echo "  - 历史中已删除的CSV文件: ${DELETE_COUNT} 个"
          echo "  - 仍在当前代码中的CSV文件: ${STILL_EXISTS_COUNT} 个"
          echo ""
          
          if [ "$DELETE_COUNT" -eq 0 ]; then
            echo "✅ 没有需要清理的已删除CSV文件"
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 显示将要清理的文件
          echo "将要清理的已删除CSV文件："
          echo ""
          while IFS=$'\t' read -r size filepath; do
            if grep -qxF "$filepath" /tmp/csv-to-delete.txt; then
              printf "  ❌ %s MB  %s\n" "$size" "$filepath"
            fi
          done < <(awk '{print $1 "\t" $2}' /tmp/all-csv-files.txt | sort -u -k2)
          echo ""
          
          # 显示保留的文件
          if [ "$STILL_EXISTS_COUNT" -gt 0 ]; then
            echo "保留的文件（仍在当前代码中）："
            while IFS=$'\t' read -r size filepath; do
              if grep -qxF "$filepath" /tmp/csv-still-exists.txt; then
                printf "  ✅ %s MB  %s\n" "$size" "$filepath"
              fi
            done < <(awk '{print $1 "\t" $2}' /tmp/all-csv-files.txt | sort -u -k2)
            echo ""
          fi
          
          # 计算可释放空间
          DELETE_SIZE=$(while IFS=$'\t' read -r size filepath; do
            if grep -qxF "$filepath" /tmp/csv-to-delete.txt; then
              echo "$size"
            fi
          done < <(awk '{print $1 "\t" $2}' /tmp/all-csv-files.txt | sort -u -k2) | awk '{sum += $1} END {printf "%.2f", sum}')
          
          echo "💾 预计释放空间: ${DELETE_SIZE} MB"
          echo ""
          
          # 安装并执行清理
          echo "🛠️  开始清理历史记录..."
          sudo apt-get update -qq && sudo apt-get install -y -qq git-filter-repo
          
          git filter-repo \
            --invert-paths \
            --paths-from-file /tmp/csv-to-delete.txt \
            --force
          
          echo "✅ 历史清理完成"
          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "delete_count=${DELETE_COUNT}" >> $GITHUB_OUTPUT
          echo "delete_size=${DELETE_SIZE}" >> $GITHUB_OUTPUT
          echo "still_exists=${STILL_EXISTS_COUNT}" >> $GITHUB_OUTPUT
      
      - name: 验证清理结果
        if: steps.clean.outputs.has_files == 'true'
        run: |
          echo ""
          echo "=========================================="
          echo "📊 清理后验证"
          echo "=========================================="
          echo ""
          
          # 检查仓库大小
          echo "📦 清理后仓库大小："
          git count-objects -vH
          echo ""
          
          # 验证已删除的文件确实不在历史中
          echo "🔍 验证清理结果..."
          REMAINING=0
          while IFS= read -r filepath; do
            if git log --all --oneline -- "$filepath" 2>/dev/null | head -1 | grep -q .; then
              REMAINING=$((REMAINING + 1))
            fi
          done < /tmp/csv-to-delete.txt
          
          if [ "$REMAINING" -eq 0 ]; then
            echo "✅ 所有已删除的CSV文件历史已清理完毕"
          else
            echo "⚠️  仍有 ${REMAINING} 个文件未完全清理"
          fi
          
          # 验证当前文件未受影响
          echo ""
          echo "✅ 当前代码中的CSV文件未受影响"
      
      - name: 推送清理后的仓库
        if: steps.clean.outputs.has_files == 'true' && github.event.inputs.force_push == 'true'
        run: |
          echo ""
          echo "=========================================="
          echo "🚀 推送清理后的历史到远程仓库"
          echo "=========================================="
          echo ""
          
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          git push origin --force --all
          git push origin --force --tags
          
          echo "✅ 已成功推送到远程仓库"
          echo ""
          echo "⚠️  所有协作者需要重新克隆仓库："
          echo "   git clone https://github.com/${{ github.repository }}.git"
      
      - name: 生成并上传清理报告
        if: always()
        run: |
          mkdir -p /tmp/report
          
          cat > /tmp/report/csv-cleanup-report.md << EOF
          # 🗑️ CSV历史记录清理报告
          
          ## 📋 基本信息
          
          - **清理时间**: $(date '+%Y-%m-%d %H:%M:%S')
          - **仓库**: ${{ github.repository }}
          - **大小阈值**: ${{ github.event.inputs.size_threshold || '1' }} MB
          - **是否推送**: ${{ github.event.inputs.force_push == 'true' && '是 ✅' || '否 ❌' }}
          
          ## 📊 清理统计
          
          EOF
          
          if [ "${{ steps.clean.outputs.has_files }}" = "true" ]; then
            echo "- **已清理文件数**: ${{ steps.clean.outputs.delete_count }}" >> /tmp/report/csv-cleanup-report.md
            echo "- **释放空间**: ${{ steps.clean.outputs.delete_size }} MB" >> /tmp/report/csv-cleanup-report.md
            echo "- **保留的文件**: ${{ steps.clean.outputs.still_exists }} 个（仍在代码中）" >> /tmp/report/csv-cleanup-report.md
            echo "" >> /tmp/report/csv-cleanup-report.md
            
            if [ -f /tmp/csv-to-delete.txt ]; then
              echo "## ❌ 已清理的文件" >> /tmp/report/csv-cleanup-report.md
              echo '```' >> /tmp/report/csv-cleanup-report.md
              cat /tmp/csv-to-delete.txt >> /tmp/report/csv-cleanup-report.md
              echo '```' >> /tmp/report/csv-cleanup-report.md
            fi
          else
            echo "- **清理结果**: 无需清理" >> /tmp/report/csv-cleanup-report.md
          fi
          
          echo "" >> /tmp/report/csv-cleanup-report.md
          echo "## 📌 重要提示" >> /tmp/report/csv-cleanup-report.md
          echo "" >> /tmp/report/csv-cleanup-report.md
          
          if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
            echo "⚠️  历史已重写，所有协作者需执行：" >> /tmp/report/csv-cleanup-report.md
            echo '```bash' >> /tmp/report/csv-cleanup-report.md
            echo "git fetch origin" >> /tmp/report/csv-cleanup-report.md
            echo "git reset --hard origin/main" >> /tmp/report/csv-cleanup-report.md
            echo "git clean -fd" >> /tmp/report/csv-cleanup-report.md
            echo '```' >> /tmp/report/csv-cleanup-report.md
          else
            echo "💡 清理在本地完成但未推送，手动推送命令：" >> /tmp/report/csv-cleanup-report.md
            echo '```bash' >> /tmp/report/csv-cleanup-report.md
            echo "git push origin --force --all" >> /tmp/report/csv-cleanup-report.md
            echo "git push origin --force --tags" >> /tmp/report/csv-cleanup-report.md
            echo '```' >> /tmp/report/csv-cleanup-report.md
          fi
          
          # 复制分析文件到报告目录
          cp /tmp/all-csv-files.txt /tmp/report/ 2>/dev/null || true
          cp /tmp/csv-to-delete.txt /tmp/report/ 2>/dev/null || true
          cp /tmp/csv-still-exists.txt /tmp/report/ 2>/dev/null || true
          
          echo "report_dir=/tmp/report" >> $GITHUB_OUTPUT
      
      - name: 上传清理报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csv-cleanup-report
          path: /tmp/report
          retention-days: 30
      
      - name: 显示最终摘要
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 清理工作流执行完成"
          echo "=========================================="
          echo ""
          
          if [ "${{ steps.clean.outputs.has_files }}" = "true" ]; then
            echo "🗑️  清理结果："
            echo "   - 已清理: ${{ steps.clean.outputs.delete_count }} 个已删除的CSV历史记录"
            echo "   - 释放空间: ${{ steps.clean.outputs.delete_size }} MB"
            echo "   - 保留: ${{ steps.clean.outputs.still_exists }} 个CSV文件（仍在代码中）"
            echo ""
            
            if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
              echo "🚀 已推送到远程仓库"
              echo "⚠️  请通知所有协作者重新克隆仓库"
            else
              echo "💡 清理已完成但未推送"
              echo "   确认无误后重新运行并设置 force_push=true"
            fi
          else
            echo "ℹ️  没有需要清理的已删除CSV历史记录"
          fi
          
          echo ""
          echo "📁 完整报告已保存为 Artifact: csv-cleanup-report"
