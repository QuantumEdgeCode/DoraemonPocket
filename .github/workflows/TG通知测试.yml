# ============================================================
# 工作流名称：Telegram 通知测试
# 功能描述：手动触发测试 Telegram Bot 消息发送功能
#           日志中不输出任何密钥、Token、Chat ID 等敏感信息
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# ============================================================

name: Telegram 通知测试

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tg-notify-test:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    
    steps:
      - name: 收集运行环境信息
        id: info
        run: |
          echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: 发送 TG 通知
        if: env.TG_BOT_TOKEN != '' && env.TG_CHAT_ID != ''
        run: |
          MESSAGE="📊 GitHub Actions 通知 %0A%0A🕐 时间：${{ steps.info.outputs.CURRENT_TIME }} (北京时间)%0A📦 仓库：${{ github.repository }}%0A🔄 事件：${{ github.event_name }}%0A🏃 运行 ID：${{ github.run_id }}%0A🔗 详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0A✅ 测试通知成功！"
          
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            > /dev/null 2>&1
          
          echo "✅ 通知发送完毕"
      
      - name: 完成
        run: echo "测试完成"
