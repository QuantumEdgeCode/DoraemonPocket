# ============================================================
# 工作流名称：Telegram 通知调试测试
# 功能描述：带详细调试信息的 TG 通知测试
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# ============================================================

name: Telegram 通知调试测试

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tg-debug-test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: 收集运行环境信息
        id: info
        run: |
          echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      # ----------------------------------------------------------
      # 调试步骤1：验证 Token 和 Chat ID 格式
      # ----------------------------------------------------------
      - name: 验证 Token 和 Chat ID
        run: |
          echo "========================================="
          echo "  Token 和 Chat ID 格式验证"
          echo "========================================="
          
          # 检查 Token 是否设置
          if [ -z "${{ secrets.TG_BOT_TOKEN }}" ]; then
            echo "❌ 错误：TG_BOT_TOKEN 未设置！"
            echo "请前往 Settings → Secrets → Actions 添加"
          else
            # 只显示 Token 的前10位和后5位，保护隐私
            TOKEN_LEN=${#TG_BOT_TOKEN}
            echo "✅ TG_BOT_TOKEN 已设置 (长度: ${TOKEN_LEN})"
            echo "   Token 格式: ${TG_BOT_TOKEN:0:10}...${TG_BOT_TOKEN: -5}"
          fi
          
          # 检查 Chat ID 是否设置
          if [ -z "${{ secrets.TG_CHAT_ID }}" ]; then
            echo "❌ 错误：TG_CHAT_ID 未设置！"
            echo "请前往 Settings → Secrets → Actions 添加"
          else
            echo "✅ TG_CHAT_ID 已设置: ${{ secrets.TG_CHAT_ID }}"
          fi
          
          echo ""
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      
      # ----------------------------------------------------------
      # 调试步骤2：测试 API 连接（getMe）
      # ----------------------------------------------------------
      - name: 测试 Bot Token 有效性
        run: |
          echo "========================================="
          echo "  测试 Bot Token 是否有效"
          echo "========================================="
          
          # 调用 getMe API 验证 Token
          RESPONSE=$(curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getMe")
          
          echo "API 响应:"
          echo "$RESPONSE"
          echo ""
          
          # 检查是否成功
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            BOT_NAME=$(echo "$RESPONSE" | jq -r '.result.username')
            echo "✅ Token 有效！Bot 用户名: @${BOT_NAME}"
          else
            echo "❌ Token 无效！请检查 TG_BOT_TOKEN 是否正确"
            echo "   确保 Token 格式为: 1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          fi
          
          echo ""
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      
      # ----------------------------------------------------------
      # 调试步骤3：测试发送消息（带详细响应）
      # ----------------------------------------------------------
      - name: 发送测试消息（调试模式）
        run: |
          echo "========================================="
          echo "  发送测试消息"
          echo "========================================="
          
          # 简单的测试消息
          MESSAGE="🧪 Telegram 通知测试
          
          🕐 时间: ${{ steps.info.outputs.CURRENT_TIME }} (北京时间)
          📦 仓库: ${{ github.repository }}
          
          ✅ 如果看到这条消息，说明配置成功！"
          
          # 发送消息并保存完整响应
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}")
          
          # 分离响应体和 HTTP 状态码
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP 状态码: ${HTTP_CODE}"
          echo "API 响应: ${BODY}"
          echo ""
          
          # 根据响应判断结果
          if echo "$BODY" | grep -q '"ok":true'; then
            echo "✅ 消息发送成功！"
          elif echo "$BODY" | grep -q '"error_code":400'; then
            echo "❌ 错误 400 - Chat ID 不存在或格式错误"
            echo "   请检查 TG_CHAT_ID: ${TG_CHAT_ID}"
          elif echo "$BODY" | grep -q '"error_code":401'; then
            echo "❌ 错误 401 - Bot Token 未授权"
          elif echo "$BODY" | grep -q '"error_code":403'; then
            echo "❌ 错误 403 - Bot 被阻止或不在该对话中"
            echo "   请先在 Telegram 中给 Bot 发送一条消息"
          elif echo "$BODY" | grep -q '"error_code":404'; then
            echo "❌ 错误 404 - 请检查 Bot Token 是否正确"
          fi
          
          echo ""
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      
      # ----------------------------------------------------------
      # 调试步骤4：尝试无 Markdown 格式发送
      # ----------------------------------------------------------
      - name: 发送纯文本消息（备用测试）
        if: always()
        run: |
          echo "========================================="
          echo "  尝试发送纯文本消息"
          echo "========================================="
          
          # 不使用 Markdown 格式的纯文本消息
          MESSAGE="Telegram 通知测试 - 纯文本
          
          时间: ${{ steps.info.outputs.CURRENT_TIME }}
          仓库: ${{ github.repository }}
          
          测试成功！"
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="${MESSAGE}")
          
          echo "API 响应: ${RESPONSE}"
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ 纯文本消息发送成功！（可能是 Markdown 格式问题）"
          else
            echo "⚠️ 纯文本消息也发送失败，请检查 Token 和 Chat ID"
          fi
          
          echo ""
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      # ----------------------------------------------------------
      # 完成提示
      # ----------------------------------------------------------
      - name: 调试完成
        run: |
          echo "========================================="
          echo "  调试测试完成！"
          echo "  请查看上方日志定位问题"
          echo "========================================="
          echo ""
          echo "常见问题排查："
          echo "1. 404 错误 → Token 格式不对或 Bot 不存在"
          echo "2. 400 错误 → Chat ID 格式不对"
          echo "3. 403 错误 → Bot 没有权限或未加入对话"
          echo "4. 确保先给 Bot 发送过 /start 命令"
