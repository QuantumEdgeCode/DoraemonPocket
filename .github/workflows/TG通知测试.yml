# ============================================================
# 工作流名称：Telegram 通知测试
# 功能描述：手动触发测试 Telegram Bot 消息发送功能
#           发送当前运行信息到指定的 Telegram 频道或群组
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# 创建时间：2026-05-09
# ============================================================

name: Telegram 通知测试

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tg-notify-test:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    
    steps:
      - name: 收集运行环境信息
        id: info
        run: |
          echo "CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "EVENT_NAME=${{ github.event_name }}" >> $GITHUB_OUTPUT
          echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_OUTPUT
      
      # ----------------------------------------------------------
      # 安全检查：只验证配置状态，不显示具体值
      # ----------------------------------------------------------
      - name: 检查配置状态
        run: |
          # 只显示有无配置，不显示具体 Token 或 Chat ID
          if [ -n "${TG_BOT_TOKEN}" ] && [ "${#TG_BOT_TOKEN}" -gt 10 ]; then
            echo "✅ TG_BOT_TOKEN 已配置 (长度: ${#TG_BOT_TOKEN} 字符)"
          else
            echo "⚠️ TG_BOT_TOKEN 未正确配置"
          fi
          
          if [ -n "${TG_CHAT_ID}" ]; then
            echo "✅ TG_CHAT_ID 已配置"
          else
            echo "⚠️ TG_CHAT_ID 未配置"
          fi
      
      # ----------------------------------------------------------
      # 安全发送：所有响应只做成功/失败判断，不输出原始数据
      # ----------------------------------------------------------
      - name: 发送 TG 通知
        if: env.TG_BOT_TOKEN != ''
        run: |
          # 使用临时文件存储响应，避免输出到日志
          TEMP_RESPONSE=$(mktemp)
          
          # 构建消息
          MESSAGE="📊 *GitHub Actions 通知*
          
          🕐 *时间：* ${{ steps.info.outputs.CURRENT_TIME }}
          📦 *仓库：* ${{ github.repository }}
          🔄 *事件：* ${{ github.event_name }}
          🏃 *运行 ID：* ${{ github.run_id }}
          🔗 *详情：* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          ✅ 测试通知成功！"
          
          # 发送消息，响应写入临时文件
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}" > "${TEMP_RESPONSE}"
          
          # 只判断成功/失败，不输出响应内容
          if grep -q '"ok":true' "${TEMP_RESPONSE}"; then
            echo "✅ Telegram 消息发送成功！"
          else
            echo "❌ 消息发送失败，请检查 Bot Token 和 Chat ID 是否正确"
          fi
          
          # 立即删除临时文件
          rm -f "${TEMP_RESPONSE}"
      
      # ----------------------------------------------------------
      # 备用纯文本消息
      # ----------------------------------------------------------
      - name: 发送纯文本通知
        if: env.TG_BOT_TOKEN != ''
        run: |
          TEMP_RESPONSE=$(mktemp)
          
          MESSAGE="GitHub Actions 通知 - 纯文本模式"
          
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="${MESSAGE}" > "${TEMP_RESPONSE}"
          
          if grep -q '"ok":true' "${TEMP_RESPONSE}"; then
            echo "✅ 纯文本消息发送成功！"
          else
            echo "❌ 纯文本消息发送失败"
          fi
          
          rm -f "${TEMP_RESPONSE}"
      
      - name: 测试完成
        run: |
          echo "========================================="
          echo "  Telegram 通知测试完成！"
          echo "========================================="
