name: 分析仓库大文件（只读模式）

on:
  workflow_dispatch:
    inputs:
      size_threshold:
        description: '文件大小阈值（单位：MB）'
        required: false
        default: '5'
        type: string

jobs:
  analyze-large-files:
    name: 分析大文件占用
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库（完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
      
      - name: 分析历史中的所有大文件（Git原生方式）
        id: analyze
        run: |
          echo "=========================================="
          echo "📊 开始分析仓库历史中的大文件"
          echo "=========================================="
          echo ""
          
          THRESHOLD="${{ github.event.inputs.size_threshold || '5' }}"
          # 转换为字节（MB * 1024 * 1024）
          THRESHOLD_BYTES=$((THRESHOLD * 1024 * 1024))
          
          echo "🔍 分析阈值: ${THRESHOLD}MB 以上的文件"
          echo "📏 阈值字节数: ${THRESHOLD_BYTES}"
          echo ""
          
          # 方法1：使用 git rev-list 查找所有 blob 对象
          echo "=========================================="
          echo "📁 历史中所有大于 ${THRESHOLD}MB 的文件"
          echo "=========================================="
          echo ""
          
          git rev-list --objects --all | \
            git cat-file --batch-check='%(objecttype) %(objectsize) %(objectname) %(rest)' | \
            awk -v threshold="$THRESHOLD_BYTES" '
              /^blob/ && $2 > threshold {
                size_mb = $2 / 1024 / 1024
                printf "%.2f MB\t%s\t%s\n", size_mb, $3, substr($0, index($0,$4))
              }
            ' | sort -hr > large-files-list.txt
          
          # 显示结果
          if [ -s large-files-list.txt ]; then
            echo "找到以下大文件："
            echo ""
            cat large-files-list.txt
            echo ""
            
            # 统计信息
            TOTAL_FILES=$(wc -l < large-files-list.txt)
            TOTAL_SIZE=$(awk '{sum += $1} END {printf "%.2f", sum}' large-files-list.txt)
            echo "📊 统计："
            echo "   - 大文件数量: ${TOTAL_FILES}"
            echo "   - 总大小: ${TOTAL_SIZE} MB"
          else
            echo "✅ 未发现大于 ${THRESHOLD}MB 的文件"
            echo "无大文件" > large-files-list.txt
          fi
          
          echo "threshold=${THRESHOLD}" >> $GITHUB_OUTPUT
      
      - name: 分析当前代码中的大文件
        run: |
          echo ""
          echo "=========================================="
          echo "📁 当前工作目录中的大文件"
          echo "=========================================="
          echo ""
          
          find . -type f -size +5M -not -path "./.git/*" -exec ls -lh {} \; | \
            awk '{print $5 "\t" $9}' | \
            sort -hr > current-large-files.txt
          
          if [ -s current-large-files.txt ]; then
            echo "当前代码中包含以下大文件："
            echo ""
            cat current-large-files.txt
            echo ""
            echo "⚠️  注意：这些文件当前存在于仓库中"
            echo "   如果要删除它们，需要先从代码中移除"
          else
            echo "✅ 当前代码中没有大于 5MB 的文件"
            echo "无大文件" > current-large-files.txt
          fi
      
      - name: 分析文件类型分布
        run: |
          echo ""
          echo "=========================================="
          echo "📊 历史中的文件类型统计"
          echo "=========================================="
          echo ""
          
          git rev-list --objects --all | \
            git cat-file --batch-check='%(objecttype) %(rest)' | \
            awk '/^blob/ {print $2}' | \
            sed 's/.*\.//' | \
            grep -v '/\|^$' | \
            sort | \
            uniq -c | \
            sort -rn | \
            head -20 > file-types.txt
          
          if [ -s file-types.txt ]; then
            echo "最常见的文件类型（按历史版本数量）："
            echo ""
            awk '{printf "   %5d 个版本  .%s\n", $1, $2}' file-types.txt
          else
            echo "无法统计文件类型"
          fi
      
      - name: 找出已删除但占用历史的大文件
        run: |
          echo ""
          echo "=========================================="
          echo "🎯 已从当前代码中删除的历史大文件"
          echo "=========================================="
          echo ""
          
          # 获取当前存在的文件列表
          git ls-tree -r HEAD | awk '{print $4}' > current-files.txt
          
          # 找出历史中存在但当前不存在的文件
          if [ -s large-files-list.txt ]; then
            echo "以下大文件已在当前代码中删除，但仍占用历史空间："
            echo ""
            
            while read -r line; do
              filename=$(echo "$line" | awk '{print $3}')
              if ! grep -q "^${filename}$" current-files.txt 2>/dev/null; then
                echo "  $line"
                echo "$line" >> removable-files.txt
              fi
            done < large-files-list.txt
            
            if [ -f removable-files.txt ] && [ -s removable-files.txt ]; then
              echo ""
              COUNT=$(wc -l < removable-files.txt)
              echo "📊 可清理的文件数量: ${COUNT}"
              echo ""
              echo "💡 这些文件可以安全地从 Git 历史中删除"
              echo "   （因为它们已不在当前代码中）"
            else
              echo "✅ 没有发现可清理的历史大文件"
              echo "   所有历史大文件都还在当前代码中"
            fi
          else
            echo "没有大文件需要分析"
          fi
      
      - name: 生成完整报告
        run: |
          cat > analysis-report.md << 'EOF'
          # 仓库大文件分析报告
          
          ## 📋 基本信息
          
          EOF
          
          echo "- **分析时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> analysis-report.md
          echo "- **阈值**: ${{ github.event.inputs.size_threshold || '5' }} MB" >> analysis-report.md
          echo "- **仓库**: ${{ github.repository }}" >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 📊 仓库整体大小" >> analysis-report.md
          echo '```' >> analysis-report.md
          git count-objects -vH >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 🎯 历史中的大文件（>${THRESHOLD}MB）" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat large-files-list.txt 2>/dev/null || echo "无" >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 📁 当前代码中的大文件" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat current-large-files.txt 2>/dev/null || echo "无" >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 🗑️ 可安全清理的历史文件（已从当前代码删除）" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat removable-files.txt 2>/dev/null || echo "无" >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 📈 文件类型统计" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat file-types.txt 2>/dev/null | head -10 >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
          
          echo "## 💡 清理建议" >> analysis-report.md
          echo "" >> analysis-report.md
          
          if [ -f removable-files.txt ] && [ -s removable-files.txt ]; then
            COUNT=$(wc -l < removable-files.txt)
            echo "✅ 发现 **${COUNT}** 个可以安全清理的历史大文件" >> analysis-report.md
            echo "" >> analysis-report.md
            echo "这些文件已经不在当前代码中，删除它们不会影响当前仓库内容。" >> analysis-report.md
            echo "" >> analysis-report.md
            echo "### 下一步操作：" >> analysis-report.md
            echo "1. 使用 BFG Repo-Cleaner 清理这些文件" >> analysis-report.md
            echo "2. 或者联系管理员执行清理操作" >> analysis-report.md
          else
            echo "⚠️ 没有发现可以安全清理的历史文件。" >> analysis-report.md
            echo "" >> analysis-report.md
            echo "当前代码中可能包含大文件，建议：" >> analysis-report.md
            echo "1. 考虑使用 Git LFS 管理大文件" >> analysis-report.md
            echo "2. 或者将大文件移到 .gitignore 中" >> analysis-report.md
          fi
          
          echo "" >> analysis-report.md
          echo "---" >> analysis-report.md
          echo "*报告生成于 GitHub Actions*" >> analysis-report.md
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        with:
          name: large-files-analysis-report
          path: |
            analysis-report.md
            large-files-list.txt
            current-large-files.txt
            removable-files.txt
            file-types.txt
          retention-days: 30
      
      - name: 显示摘要
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 分析完成"
          echo "=========================================="
          echo ""
          
          # 显示关键信息
          if [ -f removable-files.txt ] && [ -s removable-files.txt ]; then
            COUNT=$(wc -l < removable-files.txt)
            echo "🎯 发现 ${COUNT} 个可清理的历史大文件"
            echo ""
            echo "这些文件已不在当前代码中，可以安全删除"
          else
            echo "ℹ️  没有发现可清理的历史文件"
          fi
          
          echo ""
          echo "📁 完整报告已保存为 Artifact: large-files-analysis-report"
          echo ""
          echo "下载报告查看详细信息"
