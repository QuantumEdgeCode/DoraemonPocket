# ============================================================
# 工作流名称：下载通达信数据（每周五）- 多IP并行版
# 功能描述：每周五北京时间22:00自动下载通达信官网的13个数据文件
#          使用矩阵策略实现多IP并行下载，每个文件分配独立IP
#          下载完成后合并文件、计算SHA256、打包为Release
#          通过邮件和Telegram发送通知，包含所有13个节点IP
# 文件路径：.github/workflows/download-tdx-data.yml
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# 更新时间：2026-05-18
# ============================================================

name: 下载通达信数据（每周五）

# ============================================================
# 触发条件配置
# ============================================================
on:
  schedule:
    # 定时触发：每周五 UTC 14:00（北京时间 22:00）
    # cron表达式：分 时 日 月 周
    - cron: '0 14 * * 5'
  # 手动触发：允许在GitHub页面手动运行工作流
  workflow_dispatch:

# ============================================================
# 权限配置
# ============================================================
permissions:
  contents: write  # 允许创建和更新 Release
  actions: read    # 允许读取工作流运行信息

jobs:
  # ============================================================
  # 作业0：记录工作流开始时间（所有job之前执行）
  # 功能：记录整个工作流的开始时间戳，用于计算总运行时间
  # ============================================================
  record-start-time:
    runs-on: ubuntu-latest
    # 不需要超时设置，此job很快完成
    outputs:
      # 输出工作流开始时间戳（Unix秒），供后续job使用
      workflow_start: ${{ steps.set_start.outputs.workflow_start }}
      # 输出工作流开始时间（北京时间格式），用于显示
      workflow_start_time: ${{ steps.set_start.outputs.workflow_start_time }}
    steps:
      - name: 记录工作流开始时间
        id: set_start
        run: |
          # 获取当前Unix时间戳（秒）
          WORKFLOW_START=$(date -u +%s)
          # 获取北京时间格式的开始时间
          WORKFLOW_START_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          
          echo "工作流开始时间戳: $WORKFLOW_START"
          echo "工作流开始时间: $WORKFLOW_START_TIME (北京时间)"
          
          # 输出到GITHUB_OUTPUT，供后续job引用
          echo "workflow_start=${WORKFLOW_START}" >> $GITHUB_OUTPUT
          echo "workflow_start_time=${WORKFLOW_START_TIME}" >> $GITHUB_OUTPUT

  # ============================================================
  # 作业1：多IP并行下载（矩阵策略）
  # 功能：使用矩阵策略创建13个独立job，每个job使用独立IP下载一个文件
  # 输出：下载的zip文件 + 节点IP信息（通过Artifact传递给后续job）
  # ============================================================
  download-files:
    # 需要等待记录开始时间的job完成
    needs: record-start-time
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    # 单个下载任务超时时间（30分钟）
    timeout-minutes: 30
    
    # 矩阵策略配置：并行执行13个下载任务
    strategy:
      # 单个文件下载失败不影响其他文件的下载
      fail-fast: false
      # 最大并行数（GitHub免费版限制为20个并发job）
      max-parallel: 13
      
      # 定义需要下载的13个通达信数据文件
      matrix:
        file:
          # 文件1：沪市日线数据
          - name: shlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shlday.zip
            desc: 沪市日线数据
          # 文件2：深市日线数据
          - name: szlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szlday.zip
            desc: 深市日线数据
          # 文件3：北交所日线数据
          - name: bjlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/bjlday.zip
            desc: 北交所日线数据
          # 文件4：通达信指数日线
          - name: tdxzs_day
            url: https://www.tdx.com.cn/products/data/data/vipdoc/tdxzs_day.zip
            desc: 通达信指数日线
          # 文件5：沪市指数日线
          - name: shzsday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shzsday.zip
            desc: 沪市指数日线
          # 文件6：深市指数日线
          - name: szzsday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szzsday.zip
            desc: 深市指数日线
          # 文件7：沪市日线（4位代码版本）
          - name: shlday_4
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shlday_4.zip
            desc: 沪市日线(4位代码)
          # 文件8：深市日线（4位代码版本）
          - name: szlday_4
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szlday_4.zip
            desc: 深市日线(4位代码)
          # 文件9：沪市全权日线
          - name: shqqday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shqqday.zip
            desc: 沪市全权日线
          # 文件10：深市全权日线
          - name: szqqday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szqqday.zip
            desc: 深市全权日线
          # 文件11：新三板日线
          - name: xsbday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/xsbday.zip
            desc: 新三板日线
          # 文件12：62板块日线
          - name: 62day
            url: https://www.tdx.com.cn/products/data/data/vipdoc/62day.zip
            desc: 62板块日线
          # 文件13：港股通日线
          - name: ggtday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/ggtday.zip
            desc: 港股通日线
    
    steps:
      # ----------------------------------------------------------
      # 步骤1：下载单个文件并记录节点IP信息
      # ----------------------------------------------------------
      - name: 下载 ${{ matrix.file.desc }}
        run: |
          # 记录本节点开始下载时间
          NODE_START=$(date -u +%s)
          
          # 获取当前下载节点的公网IP地址
          IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          echo "下载节点 IP: $IP"
          echo "正在下载: ${{ matrix.file.name }}.zip (${{ matrix.file.desc }})"
          
          # 使用wget下载文件，设置超时30秒，最多重试3次
          if wget --timeout=30 --tries=3 -q "${{ matrix.file.url }}" -O "${{ matrix.file.name }}.zip"; then
            # 记录本节点结束下载时间
            NODE_END=$(date -u +%s)
            # 计算本节点下载耗时（秒）
            NODE_DURATION=$((NODE_END - NODE_START))
            
            # 获取文件大小（字节）
            SIZE=$(stat -c%s "${{ matrix.file.name }}.zip")
            # 转换为KB便于阅读
            SIZE_KB=$((SIZE / 1024))
            # 计算文件SHA256哈希值
            SHA256=$(sha256sum "${{ matrix.file.name }}.zip" | awk '{print $1}')
            
            echo "下载成功 - 大小: ${SIZE_KB}KB - 耗时: ${NODE_DURATION}秒 - IP: ${IP}"
            
            # 将节点信息保存到文件（格式：文件名|描述|IP|大小|SHA256|节点耗时）
            echo "${{ matrix.file.name }}|${{ matrix.file.desc }}|${IP}|${SIZE_KB}KB|${SHA256}|${NODE_DURATION}秒" > ip_info.txt
          else
            # 下载失败时记录失败信息并退出
            echo "下载失败: ${{ matrix.file.name }}.zip"
            echo "${{ matrix.file.name }}|${{ matrix.file.desc }}|FAILED|-|-|0秒" > ip_info.txt
            exit 1
          fi
      
      # ----------------------------------------------------------
      # 步骤2：上传下载的文件和IP信息为Artifact
      # ----------------------------------------------------------
      - name: 上传文件到 Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact名称包含文件名，避免13个任务之间的冲突
          name: file-${{ matrix.file.name }}
          # 上传zip文件和IP信息文件
          path: |
            ${{ matrix.file.name }}.zip
            ip_info.txt
          # Artifact保留1天后自动删除（节省存储空间）
          retention-days: 1

  # ============================================================
  # 作业2：合并文件、收集IP、打包发布、发送通知
  # 功能：等待所有13个下载任务完成后执行
  #       1. 下载所有Artifact文件
  #       2. 收集13个节点的IP信息和节点耗时
  #       3. 整理文件到日期目录
  #       4. 计算SHA256校验值
  #       5. 打包为zip文件
  #       6. 计算工作流总运行时间
  #       7. 创建GitHub Release
  #       8. 发送邮件和Telegram通知
  # ============================================================
  merge-and-release:
    # 需要等待记录开始时间和所有下载任务完成
    needs: [record-start-time, download-files]
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    # 合并任务超时时间（30分钟）
    timeout-minutes: 30
    
    # 环境变量配置（邮件和Telegram通知所需的密钥）
    env:
      MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}      # 邮件服务器地址（如 smtp.gmail.com）
      MAIL_PORT: ${{ secrets.MAIL_PORT }}            # 邮件服务器端口（如 587）
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}    # 邮件账号用户名
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}    # 邮件账号密码或应用专用密码
      MAIL_TO: ${{ secrets.MAIL_TO }}               # 邮件接收人地址
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}     # Telegram Bot的API Token
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}         # Telegram接收消息的Chat ID
    
    steps:
      # ----------------------------------------------------------
      # 步骤1：获取工作流开始时间（从record-start-time job继承）
      # ----------------------------------------------------------
      - name: 获取工作流开始时间
        id: start_time
        run: |
          echo "工作流开始时间戳: ${{ needs.record-start-time.outputs.workflow_start }}"
          echo "工作流开始时间: ${{ needs.record-start-time.outputs.workflow_start_time }} (北京时间)"
      
      # ----------------------------------------------------------
      # 步骤2：获取当前日期用于文件命名
      # ----------------------------------------------------------
      - name: 获取当前日期
        id: date
        run: |
          # 获取日期（格式：YYYY-MM-DD），用于目录和文件命名
          echo "date=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          # 获取完整日期时间（格式：YYYY-MM-DD HH:MM:SS），用于日志显示
          echo "datetime=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      # ----------------------------------------------------------
      # 步骤3：检出仓库代码
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ----------------------------------------------------------
      # 步骤4：下载所有分片Artifact文件
      # ----------------------------------------------------------
      - name: 下载所有分片文件
        uses: actions/download-artifact@v4
        with:
          # 下载到artifacts目录
          path: artifacts
          # 匹配所有file-开头的Artifact（即13个下载任务上传的文件）
          pattern: file-*
      
      # ----------------------------------------------------------
      # 步骤5：收集所有节点IP信息、节点耗时，并整理下载的文件
      # ----------------------------------------------------------
      - name: 收集所有IP信息并整理文件
        id: collect_ips
        run: |
          # 创建以日期命名的数据目录
          DATA_DIR="${{ steps.date.outputs.date }}"
          mkdir -p "$DATA_DIR"
          
          # 初始化变量
          IP_LIST=""          # 逗号分隔的IP列表
          IP_TABLE_HTML=""    # HTML格式的IP表格（用于邮件）
          IP_TABLE_MD=""      # Markdown格式的IP表格（用于Release）
          counter=1           # 文件计数器
          total_size=0        # 总文件大小（KB）
          total_node_duration=0  # 所有节点耗时总和（秒），用于参考
          max_node_duration=0    # 最长节点耗时（秒），用于估算并行总时间
          
          # 构建Markdown表格头
          IP_TABLE_MD="| 序号 | 文件名 | 描述 | 下载节点IP | 文件大小 | 节点耗时 | 状态 |\n"
          IP_TABLE_MD="${IP_TABLE_MD}|------|--------|------|------------|----------|----------|------|\n"
          
          echo "============================================================"
          echo "  多IP并行下载 - IP汇总与节点耗时统计"
          echo "============================================================"
          echo "  文件总数: 13"
          echo "------------------------------------------------------------"
          
          # 遍历所有Artifact子目录
          for artifact_dir in artifacts/file-*/; do
            if [ -d "$artifact_dir" ]; then
              # 移动zip文件到日期目录
              for zip_file in "$artifact_dir"*.zip; do
                if [ -f "$zip_file" ]; then
                  filename=$(basename "$zip_file")
                  mv "$zip_file" "$DATA_DIR/"
                  echo "已移动: $filename"
                fi
              done
              
              # 读取该节点的IP信息文件
              if [ -f "$artifact_dir/ip_info.txt" ]; then
                # 解析IP信息（格式：文件名|描述|IP|大小|SHA256|节点耗时）
                IFS='|' read -r filename desc ip size sha256 node_duration < "$artifact_dir/ip_info.txt"
                
                # 提取节点耗时数字（去掉"秒"字）
                node_sec=$(echo "$node_duration" | sed 's/秒//')
                
                # 格式化序号（01, 02, ...）
                counter_str=$(printf "%2d" $counter)
                echo "[$counter_str/13] $filename ($desc)"
                echo "          IP: $ip | 大小: $size | 节点耗时: $node_duration"
                
                # 构建Markdown表格行
                IP_TABLE_MD="${IP_TABLE_MD}| $counter | $filename | $desc | $ip | $size | $node_duration | ✅ 成功 |\n"
                
                # 构建HTML表格行（用于邮件通知）
                IP_TABLE_HTML="${IP_TABLE_HTML}<tr><td>$counter</td><td>$filename</td><td>$desc</td><td class=\"ip-highlight\">$ip</td><td>$size</td><td>$node_duration</td><td><span class=\"success-badge\">✅ 成功</span></td></tr>\n"
                
                # 构建逗号分隔的IP列表
                if [ -n "$IP_LIST" ]; then
                  IP_LIST="${IP_LIST}, ${ip}"
                else
                  IP_LIST="${ip}"
                fi
                
                # 累加文件大小
                size_num=$(echo "$size" | sed 's/KB//')
                total_size=$((total_size + size_num))
                
                # 累加节点耗时（用于参考）
                total_node_duration=$((total_node_duration + node_sec))
                
                # 记录最长节点耗时（用于估算并行总时间）
                if [ "$node_sec" -gt "$max_node_duration" ]; then
                  max_node_duration=$node_sec
                fi
                
                counter=$((counter + 1))
              fi
            fi
          done
          
          # 清理Artifact临时目录
          rm -rf artifacts
          
          # 计算总大小（转换为MB）
          total_size_mb=$(echo "scale=2; $total_size / 1024" | bc)
          
          echo "------------------------------------------------------------"
          echo "  所有13个下载节点IP: $IP_LIST"
          echo "  总大小: ${total_size_mb}MB"
          echo "  节点耗时总和(串行参考): ${total_node_duration}秒"
          echo "  最长节点耗时(并行参考): ${max_node_duration}秒"
          echo "------------------------------------------------------------"
          
          # 保存数据到文件，供后续步骤使用
          echo "$IP_LIST" > ip_list.txt              # IP列表文件
          echo -e "$IP_TABLE_MD" > ip_table_md.txt    # Markdown表格文件
          echo -e "$IP_TABLE_HTML" > ip_table_html.txt # HTML表格文件
          
          # 将数据输出到GITHUB_OUTPUT，供后续步骤引用
          echo "ip_list=${IP_LIST}" >> $GITHUB_OUTPUT
          echo "total_size=${total_size_mb}MB" >> $GITHUB_OUTPUT
          echo "total_node_duration=${total_node_duration}" >> $GITHUB_OUTPUT
          echo "max_node_duration=${max_node_duration}" >> $GITHUB_OUTPUT
          
          # 统计成功下载的文件数量
          file_count=$(ls "$DATA_DIR"/*.zip 2>/dev/null | wc -l)
          echo "file_count=${file_count}" >> $GITHUB_OUTPUT
          
          # 如果没有找到任何zip文件，报错退出
          if [ "$file_count" -eq 0 ]; then
            echo "错误：没有找到任何zip文件！"
            exit 1
          fi
      
      # ----------------------------------------------------------
      # 步骤6：计算所有zip文件的SHA256校验值
      # ----------------------------------------------------------
      - name: 计算 SHA256 校验值
        run: |
          # 切换到日期目录
          DATA_DIR="${{ steps.date.outputs.date }}"
          cd "$DATA_DIR"
          
          # 创建SHA256校验文件头
          echo "# SHA256 校验值" > SHA256SUMS.txt
          echo "# 生成时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          
          # 遍历所有zip文件计算SHA256
          for file in *.zip; do
            if [ -f "$file" ]; then
              # 计算SHA256哈希值
              sha256=$(sha256sum "$file" | awk '{print $1}')
              # 获取文件大小（字节）
              size=$(stat -c%s "$file")
              # 转换为MB便于阅读
              size_mb=$(echo "scale=2; $size / 1048576" | bc)
              # 写入校验文件
              echo "$sha256  $file" >> SHA256SUMS.txt
              echo "✅ $file: ${size_mb}MB"
            fi
          done
      
      # ----------------------------------------------------------
      # 步骤7：将所有文件打包为一个zip文件
      # ----------------------------------------------------------
      - name: 打包数据文件
        run: |
          # 定义目录名和打包文件名
          DATA_DIR="${{ steps.date.outputs.date }}"
          ZIP_NAME="${DATA_DIR}.zip"
          
          # 进入数据目录，打包所有文件
          # -0 参数表示仅存储不压缩（zip文件本身已压缩）
          cd "$DATA_DIR"
          zip -0 -r "../${ZIP_NAME}" .
          cd ..
          
          # 显示打包结果
          echo "打包完成:"
          ls -lh "$ZIP_NAME"
      
      # ----------------------------------------------------------
      # 步骤8：计算工作流总运行时间（从第一个job开始到当前时间）
      # ----------------------------------------------------------
      - name: 计算工作流总运行时间
        id: run_time
        run: |
          # 获取当前时间戳
          end=$(date -u +%s)
          # 获取工作流开始时间戳（从record-start-time job继承）
          start=${{ needs.record-start-time.outputs.workflow_start }}
          
          # 计算工作流总耗时（秒）
          total_duration=$((end - start))
          total_minutes=$((total_duration / 60))
          total_seconds=$((total_duration % 60))
          
          # 获取节点耗时统计
          total_node_duration=${{ steps.collect_ips.outputs.total_node_duration }}
          max_node_duration=${{ steps.collect_ips.outputs.max_node_duration }}
          
          # 格式化输出
          end_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          
          echo "============================================================"
          echo "  工作流运行时间统计"
          echo "============================================================"
          echo "  开始时间: ${{ needs.record-start-time.outputs.workflow_start_time }} (北京时间)"
          echo "  结束时间: ${end_time} (北京时间)"
          echo "  总运行时间: ${total_minutes}分${total_seconds}秒 (${total_duration}秒)"
          echo "------------------------------------------------------------"
          echo "  节点耗时统计:"
          echo "    13个节点耗时总和(串行参考): ${total_node_duration}秒"
          echo "    最长节点耗时(并行参考): ${max_node_duration}秒"
          echo "    说明: 由于13个节点并行下载，总运行时间接近最长节点耗时"
          echo "          加上合并、打包、上传等额外时间"
          echo "============================================================"
          
          # 输出到GITHUB_OUTPUT
          echo "end_time=${end_time}" >> $GITHUB_OUTPUT
          echo "duration=${total_minutes}分${total_seconds}秒" >> $GITHUB_OUTPUT
          echo "duration_seconds=${total_duration}" >> $GITHUB_OUTPUT
      
      # ----------------------------------------------------------
      # 步骤9：获取汇总服务器的公网IP
      # ----------------------------------------------------------
      - name: 获取汇总服务器IP
        run: |
          # 获取当前运行环境的公网IP（汇总job的IP）
          MERGE_IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          echo "MERGE_IP=${MERGE_IP}" >> $GITHUB_ENV
      
      # ----------------------------------------------------------
      # 步骤10：构建Release说明文档
      # ----------------------------------------------------------
      - name: 构建 Release Body
        id: build_body
        run: |
          # 读取Markdown格式的IP表格
          IP_TABLE_MD=$(cat ip_table_md.txt)
          
          # 将Release说明写入文件（避免YAML多行字符串问题）
          cat > release_body.md << RELEASE_EOF
          ## 📊 通达信数据下载（多IP并行）
          
          ### ⏱️ 执行信息
          | 项目 | 内容 |
          |------|------|
          | **下载日期** | ${{ steps.date.outputs.date }} |
          | **开始时间** | ${{ needs.record-start-time.outputs.workflow_start_time }} (北京时间) |
          | **结束时间** | ${{ steps.run_time.outputs.end_time }} (北京时间) |
          | **总运行耗时** | ${{ steps.run_time.outputs.duration }} |
          | **下载模式** | 🌐 多IP并行（13个独立IP） |
          | **汇总IP** | ${{ env.MERGE_IP }} |
          | **总大小** | ${{ steps.collect_ips.outputs.total_size }} |
          | **节点耗时总和(串行)** | ${{ steps.collect_ips.outputs.total_node_duration }}秒 |
          | **最长节点耗时(并行)** | ${{ steps.collect_ips.outputs.max_node_duration }}秒 |
          
