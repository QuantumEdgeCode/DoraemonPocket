# ============================================================
# 工作流名称：下载通达信数据（每周五）- 多IP并行版
# 功能描述：每周五北京时间22:00自动下载通达信官网的13个数据文件
#          使用矩阵策略实现多IP并行下载，每个文件一个独立IP
#          下载完成后合并文件、计算SHA256、打包发布
#          邮件通知包含所有13个下载节点的IP地址
# 文件路径：.github/workflows/download-tdx-data.yml
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# 更新时间：2026-05-18
# ============================================================

name: 下载通达信数据（每周五）- 多IP并行

# 触发条件配置
on:
  schedule:
    # 定时触发：每周五 UTC 14:00（北京时间 22:00）
    - cron: '0 14 * * 5'
  # 手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write  # 允许创建和更新 Release
  actions: read    # 允许读取工作流运行信息

jobs:
  # ============================================================
  # 作业1：多IP并行下载（矩阵策略）
  # 功能：使用矩阵策略创建13个独立job，每个job使用独立IP下载一个文件
  # 输出：下载的文件 + IP信息（通过Artifact传递）
  # ============================================================
  download-files:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 单个下载任务超时时间
    
    # 矩阵策略配置
    strategy:
      fail-fast: false  # 单个文件下载失败不影响其他文件的下载
      max-parallel: 13  # 最大并行数（GitHub免费版限制为20个并发job）
      
      # 定义需要下载的13个文件
      matrix:
        file:
          # 沪市日线数据
          - name: shlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shlday.zip
            desc: 沪市日线数据
          # 深市日线数据
          - name: szlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szlday.zip
            desc: 深市日线数据
          # 北交所日线数据
          - name: bjlday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/bjlday.zip
            desc: 北交所日线数据
          # 通达信指数日线
          - name: tdxzs_day
            url: https://www.tdx.com.cn/products/data/data/vipdoc/tdxzs_day.zip
            desc: 通达信指数日线
          # 沪市指数日线
          - name: shzsday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shzsday.zip
            desc: 沪市指数日线
          # 深市指数日线
          - name: szzsday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szzsday.zip
            desc: 深市指数日线
          # 沪市日线（4位代码版本）
          - name: shlday_4
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shlday_4.zip
            desc: 沪市日线(4位代码)
          # 深市日线（4位代码版本）
          - name: szlday_4
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szlday_4.zip
            desc: 深市日线(4位代码)
          # 沪市全权日线
          - name: shqqday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/shqqday.zip
            desc: 沪市全权日线
          # 深市全权日线
          - name: szqqday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/szqqday.zip
            desc: 深市全权日线
          # 新三板日线
          - name: xsbday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/xsbday.zip
            desc: 新三板日线
          # 62板块日线
          - name: 62day
            url: https://www.tdx.com.cn/products/data/data/vipdoc/62day.zip
            desc: 62板块日线
          # 港股通日线
          - name: ggtday
            url: https://www.tdx.com.cn/products/data/data/vipdoc/ggtday.zip
            desc: 港股通日线
    
    # 输出定义：将下载信息输出给后续job使用
    outputs:
      download_info: ${{ steps.prepare_output.outputs.download_info }}
    
    steps:
      # 步骤1：下载单个文件并记录IP信息
      - name: 下载 ${{ matrix.file.desc }}
        id: download
        run: |
          # 获取当前下载节点的公网IP地址
          IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          echo "📡 下载节点 IP: $IP"
          echo "📥 正在下载: ${{ matrix.file.name }}.zip (${{ matrix.file.desc }})"
          
          # 使用wget下载文件，设置超时和重试次数
          if wget --timeout=30 --tries=3 -q "${{ matrix.file.url }}" -O "${{ matrix.file.name }}.zip"; then
            # 计算下载文件的大小（字节）
            SIZE=$(stat -c%s "${{ matrix.file.name }}.zip")
            # 转换为KB便于阅读
            SIZE_KB=$((SIZE / 1024))
            # 计算文件的SHA256哈希值
            SHA256=$(sha256sum "${{ matrix.file.name }}.zip" | awk '{print $1}')
            
            # 输出下载成功信息
            echo "✅ 下载成功"
            echo "   文件大小: ${SIZE_KB}KB"
            echo "   SHA256: ${SHA256}"
            echo "   下载IP: ${IP}"
            
            # 将下载信息和IP保存到文件，用于后续汇总
            # 使用特定格式便于后续解析
            cat > download_info.json << EOF
{
  "name": "${{ matrix.file.name }}",
  "desc": "${{ matrix.file.desc }}",
  "ip": "${IP}",
  "size": ${SIZE},
  "size_kb": ${SIZE_KB},
  "sha256": "${SHA256}",
  "url": "${{ matrix.file.url }}"
}
EOF
            
            # 同时保存纯文本格式的IP信息
            echo "${{ matrix.file.name }}|${{ matrix.file.desc }}|${IP}|${SIZE_KB}KB|${SHA256}" >> ip_info.txt
          else
            # 下载失败时输出错误并退出
            echo "❌ 下载失败: ${{ matrix.file.name }}.zip"
            echo "${{ matrix.file.name }}|${{ matrix.file.desc }}|FAILED|-|-" >> ip_info.txt
            exit 1
          fi
      
      # 步骤2：将下载的文件和IP信息上传为Artifact
      - name: 上传文件到 Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact名称包含文件名，避免冲突
          name: file-${{ matrix.file.name }}
          # 上传zip文件、JSON信息和IP文本信息
          path: |
            ${{ matrix.file.name }}.zip
            download_info.json
            ip_info.txt
          retention-days: 1  # Artifact保留1天后自动删除

  # ============================================================
  # 作业2：合并文件、收集IP信息、打包发布、发送通知
  # 功能：等待所有下载任务完成后，下载所有Artifact并合并处理
  #       收集所有13个下载节点的IP，打包文件，创建Release
  #       发送包含所有IP信息的邮件通知
  # ============================================================
  merge-and-release:
    needs: download-files  # 等待所有下载任务完成
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # 环境变量配置（邮件和Telegram通知）
    env:
      MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}      # 邮件服务器地址
      MAIL_PORT: ${{ secrets.MAIL_PORT }}            # 邮件服务器端口
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}    # 邮件用户名
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}    # 邮件密码
      MAIL_TO: ${{ secrets.MAIL_TO }}               # 邮件接收人
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}     # Telegram Bot Token
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}         # Telegram Chat ID
    
    steps:
      # 步骤1：记录工作流开始时间
      - name: 记录开始时间
        id: start_time
        run: |
          # 记录Unix时间戳用于计算总耗时
          echo "start=$(date -u +%s)" >> $GITHUB_OUTPUT
          # 记录北京时间格式的开始时间
          echo "start_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      # 步骤2：获取当前日期用于文件命名
      - name: 获取当前日期
        id: date
        run: |
          # 获取日期（格式：YYYY-MM-DD）
          echo "date=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          # 获取完整日期时间（格式：YYYY-MM-DD HH:MM:SS）
          echo "datetime=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      # 步骤3：检出仓库代码（用于访问可能存在的脚本文件）
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 步骤4：下载所有分片文件（Artifact）
      - name: 下载所有分片文件
        uses: actions/download-artifact@v4
        with:
          # 下载到artifacts目录
          path: artifacts
          # 匹配所有file-开头的Artifact
          pattern: file-*
      
      # 步骤5：收集所有IP信息并生成IP汇总表
      - name: 收集所有IP信息
        id: collect_ips
        run: |
          echo "🌐 正在收集所有下载节点的IP信息..."
          echo ""
          echo "============================================================"
          echo "  多IP并行下载 - IP汇总"
          echo "============================================================"
          echo "  文件总数: 13"
          echo "------------------------------------------------------------"
          
          # 创建IP汇总文件
          echo "# 通达信数据下载 - IP汇总" > all_ips.txt
          echo "# 下载时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> all_ips.txt
          echo "" >> all_ips.txt
          echo "| 序号 | 文件名 | 描述 | 下载IP | 文件大小 | 状态 |" >> all_ips.txt
          echo "|------|--------|------|--------|----------|------|" >> all_ips.txt
          
          # 用于构建邮件的IP列表
          IP_LIST=""
          IP_TABLE=""
          counter=1
          
          # 遍历所有Artifact子目录收集IP信息
          for artifact_dir in artifacts/file-*/; do
            if [ -d "$artifact_dir" ]; then
              # 读取IP信息文件
              if [ -f "$artifact_dir/ip_info.txt" ]; then
                # 解析IP信息：格式为 文件名|描述|IP|大小|SHA256
                IFS='|' read -r filename desc ip size sha256 < "$artifact_dir/ip_info.txt"
                
                # 格式化输出
                counter_str=$(printf "%2d" $counter)
                echo "[$counter_str/13] 文件: $filename"
                echo "         描述: $desc"
                echo "         节点IP: $ip"
                echo "         文件大小: $size"
                echo "         状态: ✅ 成功"
                
                # 添加到汇总表
                echo "| $counter | $filename | $desc | $ip | $size | ✅ 成功 |" >> all_ips.txt
                
                # 构建邮件用的IP列表
                if [ -n "$IP_LIST" ]; then
                  IP_LIST="${IP_LIST}, ${ip}"
                else
                  IP_LIST="${ip}"
                fi
                
                # 构建邮件用的IP详细表格
                IP_TABLE="${IP_TABLE}${counter}. ${filename} (${desc})\n"
                IP_TABLE="${IP_TABLE}   📡 下载节点IP: ${ip}\n"
                IP_TABLE="${IP_TABLE}   📦 文件大小: ${size}\n\n"
                
                counter=$((counter + 1))
              else
                echo "⚠️  未找到IP信息文件: $artifact_dir"
              fi
            fi
          done
          
          echo "------------------------------------------------------------"
          echo "  🌐 所有13个下载节点IP:"
          echo "------------------------------------------------------------"
          
          # 显示所有IP（用逗号分隔）
          echo "$IP_LIST" | tr ',' '\n' | while read ip; do
            echo "    📡 $ip"
          done
          
          echo "------------------------------------------------------------"
          
          # 保存IP信息供后续步骤使用
          echo "ip_list=${IP_LIST}" >> $GITHUB_OUTPUT
          echo "ip_table<<EOF" >> $GITHUB_OUTPUT
          echo -e "$IP_TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 同时保存到文件
          echo "$IP_LIST" > ip_list.txt
          echo -e "$IP_TABLE" > ip_table.txt
      
      # 步骤6：显示下载的Artifact目录结构（调试用）
      - name: 显示下载的artifact结构
        run: |
          echo "========== Artifact 目录结构 =========="
          # 列出所有文件及其路径
          find artifacts -type f | sort
          echo ""
          echo "========== 各文件大小 =========="
          # 显示所有zip文件的大小
          find artifacts -type f -name "*.zip" -exec ls -lh {} \;
      
      # 步骤7：整理文件到日期目录
      - name: 整理文件到日期目录
        run: |
          # 创建以日期命名的目录
          DATA_DIR="${{ steps.date.outputs.date }}"
          mkdir -p "$DATA_DIR"
          
          echo "📁 正在整理下载的文件到 $DATA_DIR/ ..."
          
          # 遍历所有Artifact子目录
          for artifact_dir in artifacts/file-*/; do
            if [ -d "$artifact_dir" ]; then
              # 移动zip文件到日期目录
              for zip_file in "$artifact_dir"*.zip; do
                if [ -f "$zip_file" ]; then
                  # 提取文件名
                  filename=$(basename "$zip_file")
                  # 移动文件
                  mv "$zip_file" "$DATA_DIR/"
                  echo "✅ 已移动: $filename"
                fi
              done
            fi
          done
          
          # 将IP汇总文件也移到数据目录
          cp all_ips.txt "$DATA_DIR/" 2>/dev/null || true
          cp ip_list.txt "$DATA_DIR/" 2>/dev/null || true
          
          # 清理Artifact临时目录
          rm -rf artifacts
          
          # 显示整理后的目录内容
          echo ""
          echo "📋 $DATA_DIR/ 目录内容:"
          ls -lh "$DATA_DIR/"
          
          # 统计成功下载的文件数量
          file_count=$(ls "$DATA_DIR"/*.zip 2>/dev/null | wc -l)
          echo ""
          echo "📊 文件总数: $file_count"
          
          # 如果没有找到任何zip文件，报错退出
          if [ "$file_count" -eq 0 ]; then
            echo "❌ 错误：没有找到任何zip文件！"
            exit 1
          fi
      
      # 步骤8：计算所有文件的SHA256校验值
      - name: 计算 SHA256 校验值
        run: |
          # 切换到日期目录
          DATA_DIR="${{ steps.date.outputs.date }}"
          cd "$DATA_DIR"
          
          echo "🔐 正在计算 SHA256 校验值..."
          
          # 创建SHA256校验文件（文本格式）
          echo "# SHA256 校验值" > SHA256SUMS.txt
          echo "# 生成时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          
          # 遍历所有zip文件计算SHA256
          for file in *.zip; do
            if [ -f "$file" ]; then
              # 计算SHA256哈希值
              sha256=$(sha256sum "$file" | awk '{print $1}')
              # 获取文件大小
              size=$(stat -c%s "$file")
              # 转换为MB便于阅读
              size_mb=$(echo "scale=2; $size / 1048576" | bc)
              
              # 写入校验文件
              echo "$sha256  $file" >> SHA256SUMS.txt
              echo "✅ $file: ${size_mb}MB"
            fi
          done
          
          echo ""
          echo "✅ SHA256 校验值计算完成！"
      
      # 步骤9：将所有文件打包为一个ZIP文件
      - name: 打包数据文件
        run: |
          # 定义目录名和打包文件名
          DATA_DIR="${{ steps.date.outputs.date }}"
          ZIP_NAME="${DATA_DIR}.zip"
          
          echo "📦 正在打包: $ZIP_NAME"
          
          # 进入目录，打包所有文件（使用-0参数表示仅存储不压缩）
          cd "$DATA_DIR"
          zip -0 -r "../${ZIP_NAME}" .
          cd ..
          
          # 显示打包结果
          echo "✅ 打包完成:"
          ls -lh "$ZIP_NAME"
      
      # 步骤10：计算工作流运行时间
      - name: 计算运行时间
        id: run_time
        run: |
          # 计算结束时间
          end=$(date -u +%s)
          start=${{ steps.start_time.outputs.start }}
          # 计算总耗时
          duration=$((end - start))
          minutes=$((duration / 60))
          seconds=$((duration % 60))
          
          # 输出结束时间和耗时
          echo "end_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "duration=${minutes}分${seconds}秒" >> $GITHUB_OUTPUT
      
      # 步骤11：获取汇总服务器的公网IP（用于通知信息）
      - name: 获取汇总服务器IP
        run: |
          # 获取当前运行环境的公网IP
          MERGE_IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          echo "MERGE_IP=${MERGE_IP}" >> $GITHUB_ENV
      
      # 步骤12：创建GitHub Release并上传文件
      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # Release标签名（使用日期）
          tag_name: v${{ steps.date.outputs.date }}
          # Release标题
          name: 通达信数据 - ${{ steps.date.outputs.date }}
          # Release详细说明（包含所有13个IP信息）
          body: |
            ## 📊 通达信数据下载（多IP并行）
            
            ### ⏱️ 执行信息
            | 项目 | 内容 |
            |------|------|
            | **开始时间** | ${{ steps.start_time.outputs.start_time }} (北京时间) |
            | **结束时间** | ${{ steps.run_time.outputs.end_time }} (北京时间) |
            | **运行耗时** | ${{ steps.run_time.outputs.duration }} |
            | **下载模式** | 🌐 多IP并行（13个独立IP） |
            | **汇总IP** | ${{ env.MERGE_IP }} |
            
            ### 🌐 下载节点IP列表（13个独立IP）
            | 序号 | 文件名 | 描述 | 下载节点IP |
            |------|--------|------|-------------|
            ${{ steps.collect_ips.outputs.ip_table }}
            
            ### 📁 包含文件列表
            | 文件名 | 描述 | SHA256校验 |
            |--------|------|-------------|
            | shlday.zip | 沪市日线数据 | ✓ |
            | szlday.zip | 深市日线数据 | ✓ |
            | bjlday.zip | 北交所日线数据 | ✓ |
            | tdxzs_day.zip | 通达信指数日线 | ✓ |
            | shzsday.zip | 沪市指数日线 | ✓ |
            | szzsday.zip | 深市指数日线 | ✓ |
            | shlday_4.zip | 沪市日线（4位代码） | ✓ |
            | szlday_4.zip | 深市日线（4位代码） | ✓ |
            | shqqday.zip | 沪市全权日线 | ✓ |
            | szqqday.zip | 深市全权日线 | ✓ |
            | xsbday.zip | 新三板日线 | ✓ |
            | 62day.zip | 62板块日线 | ✓ |
            | ggtday.zip | 港股通日线 | ✓ |
            
            ### 🔐 校验文件
            - `SHA256SUMS.txt` - 包含所有文件的SHA256校验值
            - `all_ips.txt` - 包含所有下载节点的IP信息
            
            ### 📥 使用方法
            **1. 下载数据包:**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.date.outputs.date }}/${{ steps.date.outputs.date }}.zip
