name: 下载通达信数据（每周五）

on:
  schedule:
    # 每周五北京时间 22:00 (UTC+8) = UTC 14:00
    - cron: '0 14 * * 5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 解决权限问题
  actions: read    # 允许读取工作流信息

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 关键修改：设置作业超时为2小时，防止死循环或长时间卡住
    
    steps:
      - name: 记录开始时间
        id: start_time
        run: |
          echo "start=$(date -u +%s)" >> $GITHUB_OUTPUT
          echo "start_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "开始执行时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间"
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: 创建数据目录
        run: mkdir -p tdx_data
      
      - name: 下载通达信数据文件
        run: |
          cd tdx_data
          
          # 定义所有下载链接
          urls=(
            "https://www.tdx.com.cn/products/data/data/vipdoc/shlday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/szlday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/bjlday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/tdxzs_day.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/shzsday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/szzsday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/shlday_4.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/szlday_4.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/shqqday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/szqqday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/xsbday.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/62day.zip"
            "https://www.tdx.com.cn/products/data/data/vipdoc/ggtday.zip"
          )
          
          # 下载所有文件
          for url in "${urls[@]}"; do
            filename=$(basename "$url")
            echo "正在下载: $filename..."
            wget --timeout=30 --tries=3 -q "$url" -O "$filename" && echo "✓ $filename 下载成功" || echo "✗ $filename 下载失败"
          done
      
      - name: 计算 SHA256 校验值
        run: |
          echo "正在计算 SHA256 校验值..."
          echo ""
          
          cd tdx_data
          
          # 创建文本格式校验文件
          echo "# SHA256 校验值" > SHA256SUMS.txt
          echo "# 生成时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> SHA256SUMS.txt
          echo "# 验证命令: sha256sum -c SHA256SUMS.txt" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          
          # 创建 JSON 格式校验文件
          echo "{" > checksums.json
          echo "  \"generated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> checksums.json
          echo "  \"generated_at_beijing\": \"$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')\"," >> checksums.json
          echo "  \"files\": {" >> checksums.json
          
          first=true
          for file in *.zip; do
            if [ -f "$file" ]; then
              sha256=$(sha256sum "$file" | awk '{print $1}')
              size=$(stat -c%s "$file")
              size_kb=$((size / 1024))
              
              # 写入文本格式
              echo "$sha256  $file" >> SHA256SUMS.txt
              
              # 写入 JSON 格式
              if [ "$first" = true ]; then
                first=false
              else
                echo "    ," >> checksums.json
              fi
              echo -n "    \"$file\": {\"sha256\": \"$sha256\", \"size\": $size, \"size_kb\": $size_kb}" >> checksums.json
              
              echo "✓ $file: $sha256 (${size_kb}KB)"
            fi
          done
          
          echo "" >> checksums.json
          echo "  }" >> checksums.json
          echo "}" >> checksums.json
          
          echo ""
          echo "SHA256 校验值计算完成！"
      
      - name: 计算运行时间
        id: run_time
        run: |
          end=$(date -u +%s)
          start=${{ steps.start_time.outputs.start }}
          duration=$((end - start))
          minutes=$((duration / 60))
          seconds=$((duration % 60))
          
          echo "end_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "duration=${minutes}分${seconds}秒" >> $GITHUB_OUTPUT
          echo "duration_seconds=${duration}" >> $GITHUB_OUTPUT
          
          echo "结束时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间"
          echo "总运行时间: ${minutes} 分 ${seconds} 秒"
      
      - name: 获取当前日期
        id: date
        run: |
          echo "date=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "datetime=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: 通达信数据 - ${{ steps.date.outputs.date }}
          body: |
            ## 📊 通达信数据下载
            
            ### ⏱️ 执行信息
            | 项目 | 时间 |
            |------|------|
            | **开始时间** | ${{ steps.start_time.outputs.start_time }} (北京时间) |
            | **结束时间** | ${{ steps.run_time.outputs.end_time }} (北京时间) |
            | **运行耗时** | ${{ steps.run_time.outputs.duration }} |
            
            **下载时间**: ${{ steps.date.outputs.datetime }} (北京时间周五)
            
            ### 📁 数据文件列表
            
            | 文件名 | 说明 |
            |--------|------|
            | `shlday.zip` | 沪市日线数据 |
            | `szlday.zip` | 深市日线数据 |
            | `bjlday.zip` | 北交所日线数据 |
            | `tdxzs_day.zip` | 通达信指数日线 |
            | `shzsday.zip` | 沪市指数日线 |
            | `szzsday.zip` | 深市指数日线 |
            | `shlday_4.zip` | 沪市日线(4位代码) |
            | `szlday_4.zip` | 深市日线(4位代码) |
            | `shqqday.zip` | 沪市全权日线 |
            | `szqqday.zip` | 深市全权日线 |
            | `xsbday.zip` | 新三板日线 |
            | `62day.zip` | 62板块日线 |
            | `ggtday.zip` | 港股通日线 |
            
            ### 🔐 SHA256 校验
            
            下载后请验证文件完整性：
            
            **Linux/Mac:**
            ```bash
            # 验证所有文件
            sha256sum -c SHA256SUMS.txt
