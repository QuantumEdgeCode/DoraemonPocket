      # ----------------------------------------------------------
      # 步骤13：发送Telegram通知（包含IP信息摘要和运行时间）
      # 安全注意：禁止在日志中输出Telegram API返回的敏感信息
      # ----------------------------------------------------------
      - name: 发送 Telegram 通知
        # 仅在Telegram配置完整时执行
        if: env.TG_BOT_TOKEN && env.TG_CHAT_ID
        run: |
          # 构建Telegram通知消息
          MESSAGE="📊 通达信数据下载完成
          
          日期: ${{ steps.date.outputs.date }}
          总运行耗时: ${{ steps.run_time.outputs.duration }}
          总大小: ${{ steps.collect_ips.outputs.total_size }}
          最长节点耗时: ${{ steps.collect_ips.outputs.max_node_duration }}秒
          
          下载节点IP:
          ${{ steps.collect_ips.outputs.ip_list }}
          
          🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ steps.date.outputs.date }}"
          
          # 调用Telegram API发送消息
          # 使用 -o /dev/null 丢弃响应内容，避免泄露敏感信息
          # 使用 -w 只输出HTTP状态码
          # 注意：API返回的JSON中包含chat信息、message_id等敏感数据，绝不能输出到日志
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="$MESSAGE")
          
          # 根据HTTP状态码判断发送结果，只输出成功/失败状态
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Telegram通知发送成功 (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Telegram通知发送失败 (HTTP $HTTP_CODE)"
          fi
