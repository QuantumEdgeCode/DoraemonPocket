name: 仓库健康报告

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # 每周一早上8点自动运行

jobs:
  health-report:
    name: 生成并发送仓库健康报告
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 配置Git用户信息
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 收集仓库基本信息
        id: basic_info
        run: |
          echo "=========================================="
          echo "📊 收集仓库基本信息"
          echo "=========================================="
          echo ""
          
          REPO_NAME="${{ github.repository }}"
          DEFAULT_BRANCH=$(git remote show origin 2>/dev/null | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
          REPO_SIZE=$(git count-objects -vH 2>/dev/null | grep 'size-pack' | awk '{print $NF}' || echo "N/A")
          
          BRANCH_COUNT=$(git branch -r | wc -l)
          TOTAL_COMMITS=$(git rev-list --count --all 2>/dev/null || echo 0)
          TAG_COUNT=$(git tag | wc -l)
          
          echo "REPO_NAME=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "DEFAULT_BRANCH=${DEFAULT_BRANCH}" >> $GITHUB_OUTPUT
          echo "REPO_SIZE=${REPO_SIZE}" >> $GITHUB_OUTPUT
          echo "BRANCH_COUNT=${BRANCH_COUNT}" >> $GITHUB_OUTPUT
          echo "TOTAL_COMMITS=${TOTAL_COMMITS}" >> $GITHUB_OUTPUT
          echo "TAG_COUNT=${TAG_COUNT}" >> $GITHUB_OUTPUT
      
      - name: 分析仓库大小和对象
        run: |
          {
            echo "=========================================="
            echo "📦 仓库存储分析"
            echo "=========================================="
            echo ""
            
            echo "Git 对象统计："
            git count-objects -vH 2>/dev/null || echo "无法获取对象统计"
            echo ""
            
            echo "最大的对象（前10个）："
            git rev-list --objects --all 2>/dev/null | \
              git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' 2>/dev/null | \
              awk '/^blob/ {printf "%s\t%s\n", $2, $3}' | \
              sort -rn | head -10 | \
              awk '{printf "%.2f MB\t%s\n", $1/1024/1024, $2}'
            echo ""
            
            echo "各类型对象统计："
            git rev-list --objects --all 2>/dev/null | \
              git cat-file --batch-check='%(objecttype)' 2>/dev/null | \
              sort | uniq -c | sort -rn
          } > /tmp/size-analysis.txt
          
          cat /tmp/size-analysis.txt
      
      - name: 分析文件类型分布
        run: |
          {
            echo "=========================================="
            echo "📁 文件类型分析"
            echo "=========================================="
            echo ""
            
            echo "当前代码文件类型分布（前20名）："
            git ls-tree -r HEAD --name-only 2>/dev/null | \
              grep -v '/$' | \
              awk -F. '{print $NF}' | \
              sort | uniq -c | sort -rn | head -20 | \
              awk '{printf "  %5d 个  .%s\n", $1, $2}'
            echo ""
            
            echo "目录结构大小（前15个）："
            git ls-tree -r HEAD --name-only 2>/dev/null | \
              awk -F/ '{print $1}' | \
              sort | uniq -c | sort -rn | head -15 | \
              awk '{printf "  %5d 个文件  %s/\n", $1, $2}'
          } > /tmp/file-analysis.txt
          
          cat /tmp/file-analysis.txt
      
      - name: 分析大文件问题
        run: |
          {
            echo "=========================================="
            echo "⚠️  大文件检查"
            echo "=========================================="
            echo ""
            
            echo "当前代码中的大文件（>1MB）："
            LARGE_FILES=$(find . -type f -size +1M -not -path "./.git/*" -exec ls -lh {} \; 2>/dev/null | \
              awk '{printf "  %s\t%s\n", $5, $9}' | sort -rh | head -20)
            
            if [ -n "$LARGE_FILES" ]; then
              echo "$LARGE_FILES"
              LARGE_COUNT=$(echo "$LARGE_FILES" | wc -l)
              echo ""
              echo "  大文件总数: ${LARGE_COUNT}"
            else
              echo "  ✅ 没有大于1MB的文件"
            fi
            echo ""
            
            echo "历史记录中的大文件（>5MB）："
            HISTORY_LARGE=$(git rev-list --objects --all 2>/dev/null | \
              git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' 2>/dev/null | \
              awk '/^blob/ && $2 > 5242880 {
                printf "  %.2f MB\t%s\n", $2/1024/1024, $3
              }' | sort -rh | head -20)
            
            if [ -n "$HISTORY_LARGE" ]; then
              echo "$HISTORY_LARGE"
              HISTORY_LARGE_COUNT=$(echo "$HISTORY_LARGE" | wc -l)
              echo ""
              echo "  大文件总数: ${HISTORY_LARGE_COUNT}"
            else
              echo "  ✅ 没有大于5MB的历史文件"
            fi
          } > /tmp/large-files.txt
          
          cat /tmp/large-files.txt
      
      - name: 分析提交活动
        run: |
          {
            echo "=========================================="
            echo "📈 提交活动分析"
            echo "=========================================="
            echo ""
            
            echo "最近30天的提交活动："
            git log --since="30 days ago" --format="%ad" --date=short 2>/dev/null | \
              sort | uniq -c | tail -20 | \
              awk '{printf "  %s: %s 次提交\n", $2, $1}'
            
            echo ""
            
            echo "贡献者统计（前10名）："
            git log --all --format="%an" 2>/dev/null | sort | uniq -c | sort -rn | head -10 | \
              awk '{printf "  %3d 次提交  %s\n", $1, $2}'
            
            echo ""
            
            echo "最近4周提交趋势："
            for i in 3 2 1 0; do
              WEEK_START=$(date -d "-$((i*7)) days" +%Y-%m-%d 2>/dev/null || date -v-$((i*7))d +%Y-%m-%d)
              WEEK_END=$(date -d "-$((i*7-6)) days" +%Y-%m-%d 2>/dev/null || date -v-$((i*7-6))d +%Y-%m-%d)
              COMMIT_COUNT=$(git log --since="$WEEK_START" --until="$WEEK_END" --oneline 2>/dev/null | wc -l)
              echo "  第$((4-i))周 ($WEEK_START ~ $WEEK_END): ${COMMIT_COUNT} 次提交"
            done
          } > /tmp/activity-analysis.txt
          
          cat /tmp/activity-analysis.txt
      
      - name: 分析分支状态
        run: |
          {
            echo "=========================================="
            echo "🌿 分支分析"
            echo "=========================================="
            echo ""
            
            DEFAULT_BRANCH=$(git remote show origin 2>/dev/null | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
            
            echo "分支列表及最后提交时间："
            echo ""
            
            git branch -r | while read -r branch; do
              branch=$(echo "$branch" | xargs)
              if [ -n "$branch" ]; then
                LAST_COMMIT=$(git log -1 --format="%ar" "$branch" 2>/dev/null || echo "N/A")
                COMMIT_COUNT=$(git rev-list --count "$branch" 2>/dev/null || echo 0)
                AHEAD_BEHIND=$(git rev-list --left-right --count "$branch...$DEFAULT_BRANCH" 2>/dev/null || echo "0\t0")
                AHEAD=$(echo "$AHEAD_BEHIND" | awk '{print $1}')
                BEHIND=$(echo "$AHEAD_BEHIND" | awk '{print $2}')
                
                printf "  %-40s 最后提交: %-10s  领先:%s  落后:%s\n" \
                  "${branch#origin/}" "$LAST_COMMIT" "$AHEAD" "$BEHIND"
              fi
            done
            
            echo ""
            
            echo "⚠️  超过3个月未更新的分支："
            THREE_MONTHS_AGO=$(date -d "3 months ago" +%s 2>/dev/null || date -v-3m +%s)
            STALE_COUNT=0
            
            git branch -r | while read -r branch; do
              branch=$(echo "$branch" | xargs)
              if [ -n "$branch" ]; then
                LAST_COMMIT_DATE=$(git log -1 --format="%at" "$branch" 2>/dev/null || echo 0)
                if [ "$LAST_COMMIT_DATE" -lt "$THREE_MONTHS_AGO" ]; then
                  LAST_COMMIT_READABLE=$(git log -1 --format="%ar" "$branch" 2>/dev/null || echo "N/A")
                  echo "  🔴 ${branch#origin/} (最后提交: $LAST_COMMIT_READABLE)"
                fi
              fi
            done
          } > /tmp/branch-analysis.txt
          
          cat /tmp/branch-analysis.txt
      
      - name: 检查安全问题
        run: |
          {
            echo "=========================================="
            echo "🔒 安全检查"
            echo "=========================================="
            echo ""
            
            echo "检查可能的敏感文件："
            SENSITIVE_FOUND=false
            
            for ext in pem key p12 pfx jks keystore env secret token; do
              FILES=$(find . -type f -name "*.$ext" -not -path "./.git/*" 2>/dev/null)
              if [ -n "$FILES" ]; then
                echo "  ⚠️  发现 .$ext 文件"
                echo "$FILES" | while read -r file; do
                  echo "    - $file"
                done
                SENSITIVE_FOUND=true
              fi
            done
            
            for pattern in "credentials.*" "password.*"; do
              FILES=$(find . -type f -name "$pattern" -not -path "./.git/*" 2>/dev/null)
              if [ -n "$FILES" ]; then
                echo "  ⚠️  发现 $pattern 文件"
                echo "$FILES" | while read -r file; do
                  echo "    - $file"
                done
                SENSITIVE_FOUND=true
              fi
            done
            
            if [ "$SENSITIVE_FOUND" = false ]; then
              echo "  ✅ 未发现敏感文件"
            fi
            
            echo ""
            
            echo "Git 配置检查："
            if [ -f .gitignore ]; then
              GITIGNORE_LINES=$(wc -l < .gitignore)
              echo "  ✅ .gitignore 存在 (${GITIGNORE_LINES} 行)"
            else
              echo "  ⚠️  缺少 .gitignore 文件"
            fi
            
            if [ -f .gitattributes ]; then
              echo "  ✅ .gitattributes 存在"
            else
              echo "  ℹ️  缺少 .gitattributes 文件"
            fi
            
            if [ -f "README.md" ] || [ -f "README" ]; then
              echo "  ✅ README 文件存在"
            else
              echo "  ⚠️  缺少 README 文件"
            fi
          } > /tmp/security-check.txt
          
          cat /tmp/security-check.txt
      
      - name: 计算健康评分
        id: score
        run: |
          SCORE=100
          ISSUES=""
          
          # 检查1：.gitignore
          if [ ! -f .gitignore ]; then
            SCORE=$((SCORE - 10))
            ISSUES="${ISSUES}  - 缺少 .gitignore 文件 (-10分)\n"
          fi
          
          # 检查2：大文件
          LARGE_COUNT=$(find . -type f -size +5M -not -path "./.git/*" 2>/dev/null | wc -l)
          if [ "$LARGE_COUNT" -gt 0 ]; then
            DEDUCTION=$((LARGE_COUNT * 5))
            [ "$DEDUCTION" -gt 30 ] && DEDUCTION=30
            SCORE=$((SCORE - DEDUCTION))
            ISSUES="${ISSUES}  - 存在 ${LARGE_COUNT} 个大文件 (>5MB) (-${DEDUCTION}分)\n"
          fi
          
          # 检查3：敏感文件
          SENSITIVE_COUNT=$(find . -type f \( -name "*.pem" -o -name "*.key" -o -name "*.env" -o -name "*.secret" -o -name "*.token" \) -not -path "./.git/*" 2>/dev/null | wc -l)
          if [ "$SENSITIVE_COUNT" -gt 0 ]; then
            SCORE=$((SCORE - 20))
            ISSUES="${ISSUES}  - 发现 ${SENSITIVE_COUNT} 个可能的敏感文件 (-20分)\n"
          fi
          
          # 检查4：README
          if [ ! -f "README.md" ] && [ ! -f "README" ]; then
            SCORE=$((SCORE - 5))
            ISSUES="${ISSUES}  - 缺少 README 文件 (-5分)\n"
          fi
          
          # 检查5：长期未更新分支
          THREE_MONTHS_AGO=$(date -d "3 months ago" +%s 2>/dev/null || date -v-3m +%s)
          STALE_COUNT=0
          git branch -r | while read -r branch; do
            branch=$(echo "$branch" | xargs)
            if [ -n "$branch" ]; then
              LAST_DATE=$(git log -1 --format="%at" "$branch" 2>/dev/null || echo 0)
              if [ "$LAST_DATE" -lt "$THREE_MONTHS_AGO" ] && [ "$LAST_DATE" -gt 0 ]; then
                echo "stale" >> /tmp/stale-branches.txt
              fi
            fi
          done
          
          if [ -f /tmp/stale-branches.txt ]; then
            STALE_COUNT=$(wc -l < /tmp/stale-branches.txt)
            SCORE=$((SCORE - STALE_COUNT * 2))
            ISSUES="${ISSUES}  - ${STALE_COUNT} 个分支超过3个月未更新 (-$((STALE_COUNT * 2))分)\n"
          fi
          
          # 确保分数在合理范围
          [ "$SCORE" -lt 0 ] && SCORE=0
          [ "$SCORE" -gt 100 ] && SCORE=100
          
          # 评级
          if [ "$SCORE" -ge 90 ]; then
            RATING="🟢 优秀"
          elif [ "$SCORE" -ge 70 ]; then
            RATING="🟡 良好"
          elif [ "$SCORE" -ge 50 ]; then
            RATING="🟠 需要改进"
          else
            RATING="🔴 需要立即关注"
          fi
          
          echo "score=${SCORE}" >> $GITHUB_OUTPUT
          echo "rating=${RATING}" >> $GITHUB_OUTPUT
          
          {
            echo "=========================================="
            echo "📊 仓库健康评分"
            echo "=========================================="
            echo ""
            echo "健康评分: ${SCORE}/100"
            echo "评级: ${RATING}"
            echo ""
            if [ -n "$ISSUES" ]; then
              echo "发现的问题："
              echo -e "$ISSUES"
            else
              echo "✅ 未发现明显问题"
            fi
          } > /tmp/score-report.txt
          
          cat /tmp/score-report.txt
      
      - name: 生成HTML邮件内容
        run: |
          cat > /tmp/email-content.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
              .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
              .header h1 { margin: 0; font-size: 28px; }
              .header p { margin: 10px 0 0; opacity: 0.9; }
              .score-card { background: #f8f9fa; border-radius: 10px; padding: 30px; margin-bottom: 30px; text-align: center; }
              .score-number { font-size: 72px; font-weight: bold; color: #667eea; line-height: 1; }
              .score-rating { font-size: 24px; margin-top: 10px; }
              .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
              .info-card { background: #f8f9fa; border-radius: 8px; padding: 20px; }
              .info-label { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
              .info-value { font-size: 24px; font-weight: bold; color: #333; }
              .section { background: white; border: 1px solid #e1e4e8; border-radius: 8px; padding: 25px; margin-bottom: 20px; }
              .section h2 { color: #24292e; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #e1e4e8; }
              .section pre { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 16px; overflow-x: auto; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
              .issues { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
              .issues h3 { color: #856404; margin-top: 0; }
              .issues ul { color: #856404; margin: 10px 0 0; padding-left: 20px; }
              .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e1e4e8; }
              .badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin: 5px; }
              .badge-success { background: #d4edda; color: #155724; }
              .badge-warning { background: #fff3cd; color: #856404; }
              .badge-danger { background: #f8d7da; color: #721c24; }
            </style>
          </head>
          <body>
          <div class="header">
            <h1>🏥 仓库健康报告</h1>
            <p>REPO_NAME · 生成时间</p>
          </div>
          
          <div class="score-card">
            <div class="score-number">SCORE/100</div>
            <div class="score-rating">RATING</div>
          </div>
          
          <div class="info-grid">
            <div class="info-card">
              <div class="info-label">默认分支</div>
              <div class="info-value">DEFAULT_BRANCH</div>
            </div>
            <div class="info-card">
              <div class="info-label">仓库大小</div>
              <div class="info-value">REPO_SIZE</div>
            </div>
            <div class="info-card">
              <div class="info-label">分支数</div>
              <div class="info-value">BRANCH_COUNT</div>
            </div>
            <div class="info-card">
              <div class="info-label">总提交数</div>
              <div class="info-value">TOTAL_COMMITS</div>
            </div>
            <div class="info-card">
              <div class="info-label">标签数</div>
              <div class="info-value">TAG_COUNT</div>
            </div>
            <div class="info-card">
              <div class="info-label">贡献者</div>
              <div class="info-value">CONTRIBUTORS</div>
            </div>
          </div>
          
          <div class="section">
            <h2>📊 健康评分详情</h2>
            <pre>SCORE_DETAILS</pre>
          </div>
          
          <div class="section">
            <h2>📦 仓库存储分析</h2>
            <pre>SIZE_ANALYSIS</pre>
          </div>
          
          <div class="section">
            <h2>📁 文件类型分析</h2>
            <pre>FILE_ANALYSIS</pre>
          </div>
          
          <div class="section">
            <h2>⚠️ 大文件检查</h2>
            <pre>LARGE_FILES</pre>
          </div>
          
          <div class="section">
            <h2>📈 提交活动分析</h2>
            <pre>ACTIVITY_ANALYSIS</pre>
          </div>
          
          <div class="section">
            <h2>🌿 分支分析</h2>
            <pre>BRANCH_ANALYSIS</pre>
          </div>
          
          <div class="section">
            <h2>🔒 安全检查</h2>
            <pre>SECURITY_CHECK</pre>
          </div>
          
          <div class="footer">
            <p>本报告由 GitHub Actions 自动生成</p>
            <p>生成时间：GENERATION_TIME · 下次检查：每周一早上8点</p>
            <p>如有问题，请联系仓库管理员</p>
          </div>
          </body>
          </html>
          EOF
          
          # 替换模板变量
          GENERATION_TIME=$(date '+%Y-%m-%d %H:%M:%S')
          CONTRIBUTORS=$(git log --all --format="%an" 2>/dev/null | sort -u | wc -l)
          
          sed -i "s|REPO_NAME|${{ github.repository }}|g" /tmp/email-content.html
          sed -i "s|GENERATION_TIME|${GENERATION_TIME}|g" /tmp/email-content.html
          sed -i "s|SCORE|${{ steps.score.outputs.score }}|g" /tmp/email-content.html
          sed -i "s|RATING|${{ steps.score.outputs.rating }}|g" /tmp/email-content.html
          sed -i "s|DEFAULT_BRANCH|${{ steps.basic_info.outputs.DEFAULT_BRANCH }}|g" /tmp/email-content.html
          sed -i "s|REPO_SIZE|${{ steps.basic_info.outputs.REPO_SIZE }}|g" /tmp/email-content.html
          sed -i "s|BRANCH_COUNT|${{ steps.basic_info.outputs.BRANCH_COUNT }}|g" /tmp/email-content.html
          sed -i "s|TOTAL_COMMITS|${{ steps.basic_info.outputs.TOTAL_COMMITS }}|g" /tmp/email-content.html
          sed -i "s|TAG_COUNT|${{ steps.basic_info.outputs.TAG_COUNT }}|g" /tmp/email-content.html
          sed -i "s|CONTRIBUTORS|${CONTRIBUTORS}|g" /tmp/email-content.html
          
          # 替换各个分析内容（需要转义特殊字符）
          awk '{printf "%s\\n", $0}' /tmp/score-report.txt | sed 's|/|\\/|g' > /tmp/score-details.tmp
          sed -i "s|SCORE_DETAILS|$(cat /tmp/score-details.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/size-analysis.txt | sed 's|/|\\/|g' > /tmp/size.tmp
          sed -i "s|SIZE_ANALYSIS|$(cat /tmp/size.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/file-analysis.txt | sed 's|/|\\/|g' > /tmp/file.tmp
          sed -i "s|FILE_ANALYSIS|$(cat /tmp/file.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/large-files.txt | sed 's|/|\\/|g' > /tmp/large.tmp
          sed -i "s|LARGE_FILES|$(cat /tmp/large.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/activity-analysis.txt | sed 's|/|\\/|g' > /tmp/activity.tmp
          sed -i "s|ACTIVITY_ANALYSIS|$(cat /tmp/activity.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/branch-analysis.txt | sed 's|/|\\/|g' > /tmp/branch.tmp
          sed -i "s|BRANCH_ANALYSIS|$(cat /tmp/branch.tmp)|g" /tmp/email-content.html
          
          awk '{printf "%s\\n", $0}' /tmp/security-check.txt | sed 's|/|\\/|g' > /tmp/security.tmp
          sed -i "s|SECURITY_CHECK|$(cat /tmp/security.tmp)|g" /tmp/email-content.html
      
      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_ADDRESS }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🏥 仓库健康报告 - ${{ github.repository }} - ${{ steps.score.outputs.score }}/100"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file:///tmp/email-content.html
          priority: normal
      
      - name: 发送完成确认
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 仓库健康报告已生成并发送"
          echo "=========================================="
          echo ""
          echo "📊 健康评分: ${{ steps.score.outputs.score }}/100"
          echo "📊 评级: ${{ steps.score.outputs.rating }}"
          echo "📧 报告已发送至: ${{ secrets.MAIL_TO }}"
          echo ""
