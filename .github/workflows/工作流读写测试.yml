name: 读写与上传测试

on:
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  test-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建测试目录
        run: mkdir -p test_files

      - name: 生成 20 个 1MB 测试文件
        run: |
          echo "正在生成 20 个 1MB 测试文件..."
          cd test_files
          
          for i in $(seq 1 20); do
            # 格式化为 01, 02, ...
            filename=$(printf "test_file_%02d.bin" $i)
            
            # 生成 1MB 随机数据文件 (1024 * 1024 字节)
            dd if=/dev/urandom of="$filename" bs=1024 count=1024 2>/dev/null
            
            # 显示文件大小
            size=$(stat -c%s "$filename")
            echo "✓ $filename 创建成功 (${size} bytes)"
          done
          
          echo ""
          echo "所有测试文件生成完毕！"

      - name: 生成校验文件
        run: |
          cd test_files
          
          echo "正在生成 SHA256 校验值..."
          echo "# SHA256 校验值" > SHA256SUMS.txt
          echo "# 生成时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          
          for file in *.bin; do
            sha256=$(sha256sum "$file" | awk '{print $1}')
            echo "$sha256  $file" >> SHA256SUMS.txt
            echo "✓ $file 校验完成"
          done
          
          echo ""
          echo "SHA256 校验文件生成完毕！"

      - name: 测试写入权限
        run: |
          echo "测试写入权限..." > test_files/write_test.txt
          echo "写入时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> test_files/write_test.txt
          echo "✓ 写入测试成功"

      - name: 获取当前日期和时间
        id: date
        run: |
          echo "date=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "datetime=$(TZ='Asia/Shanghai' date '+%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-${{ steps.date.outputs.datetime }}
          name: 测试上传 - ${{ steps.date.outputs.datetime }}
          body: |
            ## 🧪 多文件上传测试
            
            **测试时间**: ${{ steps.date.outputs.datetime }}
            
            ### 📁 测试文件列表
            
            | 文件名 | 大小 | SHA256 |
            |--------|------|--------|
            | test_file_01.bin | 1MB | ✓ |
            | test_file_02.bin | 1MB | ✓ |
            | test_file_03.bin | 1MB | ✓ |
            | test_file_04.bin | 1MB | ✓ |
            | test_file_05.bin | 1MB | ✓ |
            | test_file_06.bin | 1MB | ✓ |
            | test_file_07.bin | 1MB | ✓ |
            | test_file_08.bin | 1MB | ✓ |
            | test_file_09.bin | 1MB | ✓ |
            | test_file_10.bin | 1MB | ✓ |
            | test_file_11.bin | 1MB | ✓ |
            | test_file_12.bin | 1MB | ✓ |
            | test_file_13.bin | 1MB | ✓ |
            | test_file_14.bin | 1MB | ✓ |
            | test_file_15.bin | 1MB | ✓ |
            | test_file_16.bin | 1MB | ✓ |
            | test_file_17.bin | 1MB | ✓ |
            | test_file_18.bin | 1MB | ✓ |
            | test_file_19.bin | 1MB | ✓ |
            | test_file_20.bin | 1MB | ✓ |
            
            ### 📄 其他文件
            - `SHA256SUMS.txt` - 校验文件
            - `write_test.txt` - 写入测试文件
            
            ### ✅ 测试项目
            - [x] 文件生成
            - [x] SHA256 校验
            - [x] 写入权限
            - [x] 多文件上传
            
            ---
            *GitHub Actions 自动生成*
          files: |
            test_files/test_file_01.bin
            test_files/test_file_02.bin
            test_files/test_file_03.bin
            test_files/test_file_04.bin
            test_files/test_file_05.bin
            test_files/test_file_06.bin
            test_files/test_file_07.bin
            test_files/test_file_08.bin
            test_files/test_file_09.bin
            test_files/test_file_10.bin
            test_files/test_file_11.bin
            test_files/test_file_12.bin
            test_files/test_file_13.bin
            test_files/test_file_14.bin
            test_files/test_file_15.bin
            test_files/test_file_16.bin
            test_files/test_file_17.bin
            test_files/test_file_18.bin
            test_files/test_file_19.bin
            test_files/test_file_20.bin
            test_files/SHA256SUMS.txt
            test_files/write_test.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 测试完成
        run: |
          echo "========================================="
          echo "  测试工作流执行完毕！"
          echo "========================================="
          echo "  生成文件数: 20 个 1MB 文件"
          echo "  校验文件: SHA256SUMS.txt"
          echo "  测试文件: write_test.txt"
          echo "  总文件数: 22 个"
          echo "========================================="
